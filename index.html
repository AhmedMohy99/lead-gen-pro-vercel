<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Gen Pro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }
    .box {
      max-width: 900px;
      margin: auto;
      background: #111827;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      opacity: 0.9;
    }
    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      opacity: 0.9;
    }
    #results {
      text-align: left;
      margin-top: 30px;
    }
    .lead {
      background: #1f2937;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .high {
      border-left: 5px solid #ef4444;
    }
    .low {
      border-left: 5px solid #3b82f6;
    }
    .muted {
      color: #cbd5e1;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Lead Gen Pro</h1>
    <p>Google Maps business lead finder</p>
    <button onclick="runLeads()">Run Lead Scraper</button>
    <div id="results"></div>
  </div>

  <script>
    async function runLeads() {
      const results = document.getElementById("results");
      results.innerHTML = "<p>Loading leads...</p>";

      try {
        const res = await fetch("/run");
        const data = await res.json();

        if (data.status !== "success") {
          results.innerHTML = `<p>Error: ${data.message || "Unknown error"}</p>`;
          return;
        }

        let html = `<h2>Total Leads: ${data.count}</h2>`;

        data.leads.forEach(lead => {
          const priorityClass = lead.priority === "HIGH" ? "high" : "low";
          html += `
            <div class="lead ${priorityClass}">
              <strong>${lead.name || "No Name"}</strong><br>
              <span class="muted">Phone:</span> ${lead.phone || "No phone"}<br>
              <span class="muted">Website:</span> ${lead.website || "No website"}<br>
              <span class="muted">Email:</span> ${lead.email || "No email"}<br>
              <span class="muted">Rating:</span> ${lead.rating || "N/A"}<br>
              <span class="muted">Priority:</span> ${lead.priority || "N/A"}
            </div>
          `;
        });

        results.innerHTML = html;
      } catch (error) {
        results.innerHTML = `<p>Request failed: ${error.message}</p>`;
      }
    }
  </script>
</body>
</html>
