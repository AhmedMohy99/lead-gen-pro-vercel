<!DOCTYPE html>
<html>
<head>
    <title>Lead Gen Pro</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }

        button {
            background: #22c55e;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        table {
            margin: 30px auto;
            width: 90%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #444;
            padding: 10px;
        }
    </style>
</head>

<body>

<h1>Lead Gen Pro</h1>
<p>Free Business Lead Finder</p>

<button onclick="runScraper()">Run Lead Scraper</button>

<h2 id="count"></h2>

<table id="results"></table>

<script>
async function runScraper() {
    document.getElementById("count").innerText = "Loading...";

    const res = await fetch('/api/run?q=restaurant&location=cairo');
    const data = await res.json();

    document.getElementById("count").innerText = "Total Leads: " + data.count;

    let table = "<tr><th>Name</th><th>Type</th><th>Location</th></tr>";

    data.leads.forEach(l => {
        table += `
            <tr>
                <td>${l.name}</td>
                <td>${l.type}</td>
                <td>${l.lat}, ${l.lon}</td>
            </tr>
        `;
    });

    document.getElementById("results").innerHTML = table;
}
</script>

</body>
</html>
